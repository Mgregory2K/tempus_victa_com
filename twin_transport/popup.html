<!DOCTYPE html>
<html>
<head>
  <title>Twin Transport</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    h2 { font-size: 1.2rem; margin-top: 0; }
    .status { margin-bottom: 10px; font-size: 0.9rem; color: #666; }
    .scope-select { width: 100%; margin-bottom: 15px; padding: 5px; }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    .error { color: #d9534f; margin-top: 10px; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>
  <h2>Twin Transport</h2>
  <div id="site-status" class="status">Detecting AI site...</div>

  <div id="controls" style="display: none;">
    <label for="scope">Select Scope:</label>
    <select id="scope" class="scope-select">
      <option value="ai_chat_compact">AI Chat (Compact)</option>
      <option value="basic_identity">Basic Identity</option>
      <option value="presentation_mode">Presentation Mode</option>
    </select>
    <button id="load-twin">Load Twin</button>
  </div>

  <div id="error-msg" class="error"></div>

  <script src="popup.js"></script>
</body>
</html>
